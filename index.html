<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Terror 3D</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

/* joystick */
#joy {
  position:absolute;
  right:20px;
  bottom:20px;
  width:120px;
  height:120px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
}
#stick {
  width:50px;
  height:50px;
  background:white;
  border-radius:50%;
  position:absolute;
  left:35px;
  top:35px;
}
button {
  position:absolute;
  left:20px;
  bottom:20px;
  padding:10px;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="joy"><div id="stick"></div></div>
<button onclick="jump()">🦘</button>
<button style="bottom:70px;" onclick="crouch()">🧎</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// jugador
let player = {
  x:0,
  y:0,
  z:0,
  speed:0.1,
  vy:0,
  grounded:true,
  crouching:false
};

let mode = "normal"; // normal o chase
let level = 1;

// joystick
let joy = document.getElementById("joy");
let stick = document.getElementById("stick");
let joyActive = false;
let joyX = 0, joyY = 0;

joy.addEventListener("touchstart",()=>joyActive=true);
joy.addEventListener("touchend",()=>{joyActive=false; joyX=0; joyY=0;});
joy.addEventListener("touchmove",(e)=>{
  let rect = joy.getBoundingClientRect();
  let x = e.touches[0].clientX - rect.left - 60;
  let y = e.touches[0].clientY - rect.top - 60;
  joyX = x/40;
  joyY = y/40;

  stick.style.left = (35 + x/2) + "px";
  stick.style.top = (35 + y/2) + "px";
});

// saltar
function jump(){
  if(player.grounded){
    player.vy = 0.2;
    player.grounded = false;
  }
}

// agacharse
function crouch(){
  player.crouching = !player.crouching;
}

// monstruo
let monster = {x:5,z:5};

function update(){

  // movimiento joystick
  player.x += joyX * player.speed;
  player.z += joyY * player.speed;

  // gravedad
  player.vy -= 0.01;
  player.y += player.vy;

  if(player.y <= 0){
    player.y = 0;
    player.grounded = true;
  }

  // persecución
  if(level === 30){
    mode = "chase";
  }

  if(mode === "chase"){
    player.z += 0.2; // avance automático
  }

  // monstruo persigue
  let dx = player.x - monster.x;
  let dz = player.z - monster.z;
  monster.x += dx * 0.01;
  monster.z += dz * 0.01;

  if(Math.abs(dx) < 0.5 && Math.abs(dz) < 0.5){
    alert("💀 TE ATRAPARON");
    location.reload();
  }

  draw();
  requestAnimationFrame(update);
}

// render simple 3D (fake perspective)
function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // piso
  ctx.fillStyle="#111";
  for(let i=0;i<20;i++){
    let size = 200/(i+1);
    ctx.fillRect(canvas.width/2 - size/2, canvas.height - i*30, size, 2);
  }

  // monstruo
  let mx = canvas.width/2 + (monster.x-player.x)*100;
  let mz = canvas.height/2 + (monster.z-player.z)*100;

  ctx.fillStyle="red";
  ctx.fillRect(mx, mz, 20, 20);

  // efecto terror
  ctx.fillStyle="rgba(255,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

update();
</script>

</body>
</html>
